version: "3.8"

services:
  # ═══════════════════════════════════════════════════════════════
  #  XJD Agent — Gateway 模式 (默认, WebSocket 网关)
  # ═══════════════════════════════════════════════════════════════
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: xjd-agent
    restart: unless-stopped
    ports:
      - "18789:18789"           # Gateway WebSocket
    volumes:
      - agent_data:/data/.xjd-agent
      - ./config.yaml:/data/.xjd-agent/config.yaml:ro
    environment:
      - XJD_HOME=/data/.xjd-agent
      - DISPLAY=:99
    env_file:
      - .env
    command: ["xjd-agent", "gateway", "--host", "0.0.0.0", "--port", "18789"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - xjd-net

  # ═══════════════════════════════════════════════════════════════
  #  XJD Agent — Web 模式 (HTTP API)
  # ═══════════════════════════════════════════════════════════════
  agent-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: xjd-agent-web
    restart: unless-stopped
    profiles: ["web"]
    ports:
      - "8080:8080"
    volumes:
      - agent_data:/data/.xjd-agent
    environment:
      - XJD_HOME=/data/.xjd-agent
      - DISPLAY=:99
    env_file:
      - .env
    command: ["xjd-agent", "web", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - xjd-net

  # ═══════════════════════════════════════════════════════════════
  #  XJD Agent — Chat 模式 (交互式终端)
  # ═══════════════════════════════════════════════════════════════
  agent-chat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: xjd-agent-chat
    profiles: ["chat"]
    stdin_open: true
    tty: true
    volumes:
      - agent_data:/data/.xjd-agent
    environment:
      - XJD_HOME=/data/.xjd-agent
      - DISPLAY=:99
    env_file:
      - .env
    command: ["xjd-agent", "chat"]
    networks:
      - xjd-net

  # ═══════════════════════════════════════════════════════════════
  #  Redis — 会话缓存 + 消息队列 (可选)
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: xjd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - xjd-net

volumes:
  agent_data:
    driver: local
  redis_data:
    driver: local

networks:
  xjd-net:
    driver: bridge
