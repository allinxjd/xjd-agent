skill_id: podcast-outline
name: 播客大纲
description: 规划播客节目的主题、结构和讨论要点
trigger: 播客大纲, 播客脚本, podcast outline, podcast script
category: creative
steps:
  - description: 确定播客主题、嘉宾和目标听众
