skill_id: load-testing
name: 压力测试
description: 设计压测场景执行负载测试并分析性能瓶颈给出优化建议
trigger: 压力测试, 负载测试, 性能测试, load testing, stress test, benchmark
category: devops
steps:
  - description: 确定测试目标（QPS、并发数、持续时间、关键接口）
    tool: read_file
    args_template: {path: "test/load/config.yaml"}
  - description: 使用 wrk 或 ab 执行基准测试
    tool: run_terminal
    args_template: {command: "wrk -t4 -c100 -d30s --latency ${TARGET_URL}"}
  - description: 执行递增并发压力测试
    tool: run_terminal
    args_template: {command: "for c in 50 100 200 500; do echo \"=== Concurrency: $c ===\"; ab -n 1000 -c $c ${TARGET_URL}; done"}
  - description: 监控测试期间服务器资源使用
    tool: run_terminal
    args_template: {command: "vmstat 1 10 && free -h && df -h"}
  - description: 收集应用层性能指标（响应时间、错误率、吞吐量）
    tool: http_request
    args_template: {url: "${TARGET_URL}/api/health", method: "GET"}
  - description: 分析瓶颈并输出优化建议（连接池、缓存、索引、限流等）
tags: [load-testing, performance, benchmark, stress-test]
examples:
  - 对 /api/health 接口做 500 并发压力测试
  - 测试系统在高并发下的性能表现
version: 1
use_count: 0
success_rate: 1.0
