skill_id: secret-scanning
name: 密钥扫描
description: 扫描代码库检测硬编码的密钥密码和敏感信息
trigger: 密钥扫描, 敏感信息检测, secret scanning, 硬编码密钥, credential scan
category: security
steps:
  - description: 扫描常见密钥模式 (API Key/Token/Password)
    tool: grep_search
    args_template: {pattern: "(api[_-]?key|secret|token|password|credential)\\s*[:=]\\s*['\"][^'\"]+['\"]", path: "${PROJECT_ROOT}"}
  - description: 检查私钥和证书文件
    tool: grep_search
    args_template: {pattern: "(BEGIN (RSA |EC )?PRIVATE KEY|BEGIN CERTIFICATE)", path: "${PROJECT_ROOT}"}
  - description: 检查 .env 文件是否被纳入版本控制
    tool: grep_search
    args_template: {pattern: "\\.env", path: "${PROJECT_ROOT}/.gitignore"}
  - description: 评估每个发现的风险等级
  - description: 输出扫描报告 (泄露位置 + 类型 + 风险等级 + 修复建议)
tags: [secret-scanning, security, credentials, sensitive-data]
examples:
  - 扫描代码里有没有硬编码的密钥
  - scan for leaked secrets in the codebase
version: 1
use_count: 0
success_rate: 1.0
