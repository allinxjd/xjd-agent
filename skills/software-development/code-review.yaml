skill_id: code-review
name: 代码审查
description: 审查代码质量、安全漏洞和最佳实践
trigger: 审查代码、review code、检查代码质量
category: code
steps:
  - description: 读取目标文件
    tool: read_file
    args_template: {path: "{file_path}"}
  - description: 分析代码结构和逻辑
  - description: 检查安全漏洞 (SQL注入、XSS、硬编码密钥等)
  - description: 检查性能问题 (N+1查询、内存泄漏等)
  - description: 输出审查报告 (问题列表 + 改进建议)
tags: [code, review, security, quality]
examples:
  - 帮我审查这个文件的代码
  - review this pull request
  - 检查代码有没有安全问题
version: 1
use_count: 0
success_rate: 1.0
